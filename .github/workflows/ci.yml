name: HackWin CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Smart Contract ─────────────────────────────
  contract:
    name: 🔧 Build & Test Contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            hackathon-registry/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('hackathon-registry/Cargo.lock') }}

      - name: Build Token Contract (WASM)
        run: |
          cd hackathon-registry
          cargo build --target wasm32-unknown-unknown --release -p hackwin-token

      - name: Build Registry Contract (WASM)
        run: |
          cd hackathon-registry
          cargo build --target wasm32-unknown-unknown --release -p hackathon-registry

      - name: Run All Contract Tests
        run: |
          cd hackathon-registry
          cargo test

  # ── Frontend ───────────────────────────────────
  frontend:
    name: 🌐 Lint & Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: cd frontend && npm ci

      - name: Lint
        run: cd frontend && npm run lint

      - name: Build
        run: cd frontend && npm run build
        env:
          NEXT_PUBLIC_CONTRACT_ID: ${{ secrets.NEXT_PUBLIC_CONTRACT_ID }}
          NEXT_PUBLIC_TOKEN_CONTRACT_ID: ${{ secrets.NEXT_PUBLIC_TOKEN_CONTRACT_ID }}
          NEXT_PUBLIC_SOROBAN_RPC_URL: https://soroban-testnet.stellar.org
          NEXT_PUBLIC_NETWORK_PASSPHRASE: "Test SDF Network ; September 2015"

